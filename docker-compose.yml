services:
  app:
    build: .
    container_name: photo-platform
    restart: unless-stopped
    ports:
      # DSM reverse proxy should forward HTTPS traffic to this port.
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Paths inside the container — do not change; edit the volume
      # mappings below instead.
      DATABASE_URL: "file:/data/db/app.db?connection_limit=1"
      PHOTOS_DIR: "/data/photos"
    volumes:
      # Left side = folder on the NAS (created automatically next to this
      # compose file). Point these at shared-folder paths if you prefer,
      # e.g. /volume1/docker/photo-platform/photos:/data/photos
      - ./data/photos:/data/photos
      - ./data/db:/data/db
